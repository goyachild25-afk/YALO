<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ServiciosYa — Tu hogar en las mejores manos. Servicios del hogar en República Dominicana.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ServiciosYa">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Theme color — Azul Caribeño -->

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ServiciosYa</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Maps JS API — requerido por google_maps_flutter_web -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAl7co1z59RELF4bZDO2HCRcWDtINPh560" defer></script>

  <!-- PWA install prompt capture -->
  <script>
    window.deferredPrompt = null;
    window.appInstalled = false;
    window.isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent.toLowerCase());
    window.isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true;

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      window.deferredPrompt = e;
    });
    window.addEventListener('appinstalled', function() {
      window.deferredPrompt = null;
      window.appInstalled = true;
      window.isInStandaloneMode = true;
    });
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
